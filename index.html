<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minesweeper</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      letter-spacing: 2px;
      color: #a0c4ff;
    }

    /* ─── Difficulty selector ─── */
    #difficulty {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    #difficulty button {
      padding: 8px 20px;
      border: 2px solid #4a4a8a;
      border-radius: 6px;
      background: #16213e;
      color: #ccc;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    #difficulty button:hover,
    #difficulty button.active {
      background: #4a4a8a;
      color: #fff;
      border-color: #a0c4ff;
    }

    /* ─── Info bar ─── */
    #info-bar {
      display: flex;
      gap: 30px;
      margin-bottom: 14px;
      font-size: 1.1rem;
      background: #16213e;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid #4a4a8a;
    }

    .info-item span:first-child { margin-right: 6px; }

    /* ─── Board ─── */
    #board-wrapper {
      overflow: auto;
      max-width: 95vw;
    }

    #board {
      display: inline-grid;
      gap: 2px;
      background: #0f0f23;
      padding: 8px;
      border-radius: 8px;
      border: 2px solid #4a4a8a;
      user-select: none;
    }

    .cell {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s;
    }

    /* Covered */
    .cell.covered {
      background: #2e2e6e;
      border: 1px solid #4a4a9a;
    }
    .cell.covered:hover { background: #3a3a8e; }

    /* Flagged */
    .cell.flagged { background: #2e2e6e; border: 1px solid #4a4a9a; }

    /* Revealed */
    .cell.revealed {
      background: #1a1a3e;
      border: 1px solid #2a2a5e;
      cursor: default;
    }

    /* Number colors */
    .cell[data-n="1"] { color: #64b5f6; }
    .cell[data-n="2"] { color: #81c784; }
    .cell[data-n="3"] { color: #e57373; }
    .cell[data-n="4"] { color: #7986cb; }
    .cell[data-n="5"] { color: #ff8a65; }
    .cell[data-n="6"] { color: #4dd0e1; }
    .cell[data-n="7"] { color: #f06292; }
    .cell[data-n="8"] { color: #bdbdbd; }

    /* Mine */
    .cell.mine-hit { background: #8b0000 !important; }
    .cell.mine-revealed { background: #3a1a1a; }

    /* ─── Overlay message ─── */
    #message {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #message.show { display: flex; }

    #message-box {
      background: #16213e;
      border: 2px solid #a0c4ff;
      border-radius: 12px;
      padding: 36px 48px;
      text-align: center;
    }

    #message-box h2 { font-size: 2rem; margin-bottom: 12px; }
    #message-box p  { color: #aaa; margin-bottom: 20px; }

    #message-box button {
      padding: 10px 28px;
      border: none;
      border-radius: 6px;
      background: #4a4a8a;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    #message-box button:hover { background: #6060aa; }

    /* ─── X post buttons ─── */
    .x-post-area {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .x-post-area .x-label {
      font-size: 0.8rem;
      color: #888;
    }
    .x-btn-row {
      display: flex;
      gap: 8px;
    }
    .x-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #000;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .x-btn:hover { background: #333; }
    .x-btn svg { width: 14px; height: 14px; fill: #fff; flex-shrink: 0; }

    #restart-btn {
      margin-top: 0;
      padding: 8px 20px;
      border: 2px solid #4a4a8a;
      border-radius: 6px;
      background: #16213e;
      color: #ccc;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
    }
    #restart-btn:hover { background: #4a4a8a; color: #fff; }

    /* ─── Records bar ─── */
    #records-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 14px;
      font-size: 0.85rem;
      background: #16213e;
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #4a4a8a;
      color: #aaa;
    }
    #records-bar .record-item { display: flex; align-items: center; gap: 6px; }
    #records-bar .record-label { color: #888; }
    #records-bar .record-value { color: #ffd700; font-weight: bold; }
    #records-bar .record-value.none { color: #555; font-weight: normal; }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #22c55e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Screenshot button ─── */
    .screenshot-btn {
      padding: 8px 16px;
      border: 2px solid #4a4a8a;
      border-radius: 6px;
      background: #16213e;
      color: #ccc;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .screenshot-btn:hover { background: #4a4a8a; color: #fff; }
    .screenshot-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── New record badge ─── */
    #new-record-badge {
      display: none;
      font-size: 1.1rem;
      color: #ffd700;
      margin-bottom: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>💣 Minesweeper</h1>

  <div id="difficulty">
    <button data-level="beginner" class="active">初級 9×9 / 10</button>
    <button data-level="intermediate">中級 16×16 / 40</button>
    <button data-level="expert">上級 30×16 / 99</button>
  </div>

  <div id="records-bar">
    <div class="record-item">🏅 初級: <span class="record-label"></span><span id="rec-beginner" class="record-value none">--</span></div>
    <div class="record-item">🏅 中級: <span class="record-label"></span><span id="rec-intermediate" class="record-value none">--</span></div>
    <div class="record-item">🏅 上級: <span class="record-label"></span><span id="rec-expert" class="record-value none">--</span></div>
  </div>

  <div id="info-bar">
    <div class="info-item"><span>💣</span><span id="mine-count">10</span></div>
    <div class="info-item"><span>⏱</span><span id="timer">0</span>s</div>
    <button id="restart-btn">🔄 Restart</button>
  </div>

  <div id="board-wrapper">
    <div id="board"></div>
  </div>

  <div id="toast">📋 クリップボードにコピーしました！</div>

  <div id="message">
    <div id="message-box">
      <h2 id="msg-title"></h2>
      <p id="new-record-badge">🏆 新記録！</p>
      <p id="msg-body"></p>
      <button id="msg-restart">もう一度</button>
      <div class="x-post-area" id="x-post-area"></div>
      <div style="margin-top:8px">
        <button class="screenshot-btn" id="screenshot-btn">📷 盤面をコピー</button>
      </div>
    </div>
  </div>

  <script>
    // ─── Config ───────────────────────────────────────────────
    const LEVELS = {
      beginner:     { rows: 9,  cols: 9,  mines: 10 },
      intermediate: { rows: 16, cols: 16, mines: 40 },
      expert:       { rows: 16, cols: 30, mines: 99 },
    };

    // ─── State ────────────────────────────────────────────────
    let state = {
      level: 'beginner',
      rows: 0, cols: 0, mines: 0,
      board: [],      // 2D array of cell objects
      cells: [],      // flat DOM element array
      started: false,
      gameOver: false,
      flagCount: 0,
      revealedCount: 0,
      timerInterval: null,
      seconds: 0,
    };

    // ─── DOM refs ─────────────────────────────────────────────
    const boardEl        = document.getElementById('board');
    const mineCountEl    = document.getElementById('mine-count');
    const timerEl        = document.getElementById('timer');
    const messageEl      = document.getElementById('message');
    const msgTitle       = document.getElementById('msg-title');
    const msgBody        = document.getElementById('msg-body');
    const msgRestart     = document.getElementById('msg-restart');
    const restartBtn     = document.getElementById('restart-btn');
    const newRecordBadge = document.getElementById('new-record-badge');
    const recEls = {
      beginner:     document.getElementById('rec-beginner'),
      intermediate: document.getElementById('rec-intermediate'),
      expert:       document.getElementById('rec-expert'),
    };

    // ─── Records (localStorage) ───────────────────────────────
    const RECORDS_KEY = 'minesweeper-records';

    function getRecords() {
      try {
        return JSON.parse(localStorage.getItem(RECORDS_KEY)) || {};
      } catch { return {}; }
    }

    function saveRecord(level, seconds) {
      const records = getRecords();
      const prev = records[level];
      const isNew = prev === undefined || seconds < prev;
      if (isNew) {
        records[level] = seconds;
        localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
      }
      return isNew;
    }

    function renderRecords() {
      const records = getRecords();
      for (const [level, el] of Object.entries(recEls)) {
        const val = records[level];
        if (val !== undefined) {
          el.textContent = `${val}秒`;
          el.classList.remove('none');
        } else {
          el.textContent = '--';
          el.classList.add('none');
        }
      }
    }

    // ─── Init ─────────────────────────────────────────────────
    function init(level) {
      const cfg = LEVELS[level];
      clearInterval(state.timerInterval);
      state = {
        level,
        rows: cfg.rows,
        cols: cfg.cols,
        mines: cfg.mines,
        board: [],
        cells: [],
        started: false,
        gameOver: false,
        flagCount: 0,
        revealedCount: 0,
        timerInterval: null,
        seconds: 0,
      };
      timerEl.textContent = '0';
      mineCountEl.textContent = cfg.mines;
      messageEl.classList.remove('show');
      buildBoard();
    }

    // ─── Build empty board ────────────────────────────────────
    function buildBoard() {
      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${state.cols}, 32px)`;
      state.board = [];
      state.cells = [];

      for (let r = 0; r < state.rows; r++) {
        state.board.push([]);
        for (let c = 0; c < state.cols; c++) {
          const cell = {
            r, c,
            mine: false,
            revealed: false,
            flagged: false,
            adjacent: 0,
          };
          state.board[r].push(cell);

          const el = document.createElement('div');
          el.className = 'cell covered';
          el.dataset.r = r;
          el.dataset.c = c;
          el.addEventListener('click', onLeftClick);
          el.addEventListener('contextmenu', onRightClick);
          boardEl.appendChild(el);
          state.cells.push(el);
        }
      }
    }

    // ─── Place mines (after first click) ─────────────────────
    function placeMines(safeR, safeC) {
      const safe = new Set();
      // Safe zone: clicked cell + its neighbors
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = safeR + dr, nc = safeC + dc;
          if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols) {
            safe.add(nr * state.cols + nc);
          }
        }
      }

      let placed = 0;
      while (placed < state.mines) {
        const idx = Math.floor(Math.random() * state.rows * state.cols);
        if (safe.has(idx)) continue;
        const r = Math.floor(idx / state.cols);
        const c = idx % state.cols;
        if (state.board[r][c].mine) continue;
        state.board[r][c].mine = true;
        placed++;
      }

      // Compute adjacency
      for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++) {
          if (state.board[r][c].mine) continue;
          let count = 0;
          eachNeighbor(r, c, (nr, nc) => { if (state.board[nr][nc].mine) count++; });
          state.board[r][c].adjacent = count;
        }
      }
    }

    // ─── Neighbor iterator ────────────────────────────────────
    function eachNeighbor(r, c, fn) {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < state.rows && nc >= 0 && nc < state.cols) {
            fn(nr, nc);
          }
        }
      }
    }

    // ─── Cell element helper ──────────────────────────────────
    function cellEl(r, c) {
      return state.cells[r * state.cols + c];
    }

    // ─── Reveal cell (flood-fill for zeros) ───────────────────
    function reveal(r, c) {
      const cell = state.board[r][c];
      if (cell.revealed || cell.flagged) return;
      cell.revealed = true;
      state.revealedCount++;

      const el = cellEl(r, c);

      if (cell.mine) {
        el.className = 'cell mine-hit';
        el.textContent = '💣';
        return;
      }

      el.className = 'cell revealed';
      if (cell.adjacent > 0) {
        el.textContent = cell.adjacent;
        el.dataset.n = cell.adjacent;
      } else {
        // Flood-fill
        eachNeighbor(r, c, (nr, nc) => reveal(nr, nc));
      }
    }

    // ─── Reveal all mines on game over ────────────────────────
    function revealAllMines(hitR, hitC) {
      for (let r = 0; r < state.rows; r++) {
        for (let c = 0; c < state.cols; c++) {
          const cell = state.board[r][c];
          const el = cellEl(r, c);
          if (cell.mine && !(r === hitR && c === hitC)) {
            if (!cell.flagged) {
              el.className = 'cell mine-revealed';
              el.textContent = '💣';
            }
          } else if (!cell.mine && cell.flagged) {
            el.textContent = '❌'; // wrong flag
          }
        }
      }
    }

    // ─── Left click ───────────────────────────────────────────
    function onLeftClick(e) {
      if (state.gameOver) return;
      const r = +e.currentTarget.dataset.r;
      const c = +e.currentTarget.dataset.c;
      const cell = state.board[r][c];
      if (cell.revealed || cell.flagged) return;

      // First click: place mines and start timer
      if (!state.started) {
        state.started = true;
        placeMines(r, c);
        state.timerInterval = setInterval(() => {
          state.seconds++;
          timerEl.textContent = state.seconds;
        }, 1000);
      }

      if (cell.mine) {
        reveal(r, c); // shows the hit mine red
        revealAllMines(r, c);
        endGame(false);
        return;
      }

      reveal(r, c);
      checkWin();
    }

    // ─── Right click ──────────────────────────────────────────
    function onRightClick(e) {
      e.preventDefault();
      if (state.gameOver) return;
      const r = +e.currentTarget.dataset.r;
      const c = +e.currentTarget.dataset.c;
      const cell = state.board[r][c];
      if (cell.revealed) return;

      cell.flagged = !cell.flagged;
      state.flagCount += cell.flagged ? 1 : -1;
      const el = cellEl(r, c);
      el.textContent = cell.flagged ? '🚩' : '';
      mineCountEl.textContent = state.mines - state.flagCount;
    }

    // ─── Win check ────────────────────────────────────────────
    function checkWin() {
      const total = state.rows * state.cols;
      if (state.revealedCount === total - state.mines) {
        endGame(true);
      }
    }

    // ─── Toast ────────────────────────────────────────────────
    const toastEl = document.getElementById('toast');
    let toastTimer = null;
    function showToast(msg, isError = false) {
      toastEl.textContent = msg;
      toastEl.style.background = isError ? '#ef4444' : '#22c55e';
      clearTimeout(toastTimer);
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    // ─── Screenshot ───────────────────────────────────────────
    document.getElementById('screenshot-btn').addEventListener('click', async () => {
      const btn = document.getElementById('screenshot-btn');
      btn.disabled = true;
      btn.textContent = '⏳ 処理中…';
      try {
        const canvas = await html2canvas(document.getElementById('board-wrapper'), {
          backgroundColor: '#1a1a2e',
          scale: 2,
        });
        canvas.toBlob(async (blob) => {
          try {
            await navigator.clipboard.write([
              new ClipboardItem({ 'image/png': blob })
            ]);
            showToast('📋 クリップボードにコピーしました！');
          } catch {
            showToast('⚠️ コピーに失敗しました（ブラウザの権限を確認してください）', true);
          }
          btn.disabled = false;
          btn.textContent = '📷 盤面をコピー';
        }, 'image/png');
      } catch {
        showToast('⚠️ スクリーンショットの取得に失敗しました', true);
        btn.disabled = false;
        btn.textContent = '📷 盤面をコピー';
      }
    });

    // ─── X SVG icon ───────────────────────────────────────────
    const X_ICON = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`;

    // ─── Open X intent ────────────────────────────────────────
    function postToX(text) {
      const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
      window.open(url, '_blank', 'noopener');
    }

    // ─── Build X post area ────────────────────────────────────
    function buildXPostArea(seconds, isNew) {
      const xArea = document.getElementById('x-post-area');
      xArea.innerHTML = '';

      const levelLabel = { beginner: '初級', intermediate: '中級', expert: '上級' }[state.level];
      const recordNote = isNew ? ' 🏆新記録！' : '';
      const baseText   = `マインスイーパー【${levelLabel}】${seconds}秒クリア！🎉${recordNote} #Minesweeper`;

      const btn = document.createElement('button');
      btn.className = 'x-btn';
      btn.innerHTML = `${X_ICON} Xに投稿`;
      btn.addEventListener('click', () => postToX(baseText));
      xArea.appendChild(btn);
    }

    // ─── End game ────────────────────────────────────────────
    function endGame(won) {
      state.gameOver = true;
      clearInterval(state.timerInterval);

      if (won) {
        const isNew = saveRecord(state.level, state.seconds);
        renderRecords();
        msgTitle.textContent = '🎉 クリア！';
        msgBody.textContent = `${state.seconds}秒でクリアしました！`;
        newRecordBadge.style.display = isNew ? 'block' : 'none';
        buildXPostArea(state.seconds, isNew);
      } else {
        msgTitle.textContent = '💥 ゲームオーバー';
        msgBody.textContent = '地雷を踏んでしまいました…';
        newRecordBadge.style.display = 'none';
        document.getElementById('x-post-area').innerHTML = '';
      }

      setTimeout(() => messageEl.classList.add('show'), 300);
    }

    // ─── Difficulty buttons ───────────────────────────────────
    document.querySelectorAll('#difficulty button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#difficulty button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        init(btn.dataset.level);
      });
    });

    // ─── Restart buttons ──────────────────────────────────────
    restartBtn.addEventListener('click', () => init(state.level));
    msgRestart.addEventListener('click', () => init(state.level));

    // ─── Start ───────────────────────────────────────────────
    renderRecords();
    init('beginner');
  </script>
</body>
</html>
